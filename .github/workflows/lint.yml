name: Lint

on:
  push:
    branches: [master]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # shellcheck is pre-installed on ubuntu-latest runners.
      # Gating at -S error catches genuine bugs (parser failures, undefined
      # vars, broken redirections) without blocking on style. Warnings can
      # still be surfaced locally with `shellcheck -S warning ...`.
      - name: shellcheck (errors only)
        run: shellcheck -S error ticket plugins/ticket-*
